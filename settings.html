<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="/style.css" rel="stylesheet" type="text/css" media="all">
    <link rel="icon" href="site icon.ico" /> 
    <script src="/settings.js"></script>

  <body style="padding-top: 45px;">
    <div class="topnav">
      <a class="active" href="/">🏠</a>
      <a href="/projects.html">Projects</a>
      <a href="/roms.html">ROMs</a>
      <a href="/settings.html">Settings</a>
    </div>
  <center>
    <p></p>
  <div class="main">
    <h1>Settings</h1>
    <div class="settings-toggles" style="margin: 24px auto 24px auto; width: fit-content; text-align: left;">
      
      <div class="setting-item">
        <span>Enable blur effect</span>
        <label class="switch">
          <input type="checkbox" class="custom-checkbox" data-setting-key="blurEnabled">
          <span class="slider"></span>
        </label>
      </div>

      <div class="setting-item">
        <span>Enable background image</span>
        <label class="switch">
          <input type="checkbox" class="custom-checkbox" data-setting-key="bgEnabled">
          <span class="slider"></span>
        </label>
      </div>

      <div class="setting-item">
        <span>Dark mode</span>
        <label class="switch">
          <input type="checkbox" class="custom-checkbox" data-setting-key="darkEnabled">
          <span class="slider"></span>
        </label>
      </div>

      <div class="setting-item">
        <span>Use Adwaita fonts</span>
        <label class="switch">
          <input type="checkbox" class="custom-checkbox" data-setting-key="adwaitaEnabled" data-default-on="false">
          <span class="slider"></span>
        </label>
      </div>

      <div class="setting-item">
        <span>Wallpaper</span>
        <select class="custom-select" data-setting-key="wallpaper">
          <option value="background.jpg">Default</option>
          <option value="sky.jpg">sky.jpg</option>
          <option value="sky2.jpg">sky2.jpg</option>
          <option value="sky3.jpg">sky3.jpg</option>
        </select>
      </div>
            <div class="setting-item">
        <span>Accent Color</span>
        <select class="custom-select" data-setting-key="accentColor">
          <option value="#007bff">Blue (Default)</option>
          <option value="#ff4500">Orange Red</option>
          <option value="#2ecc71">Emerald Green</option>
          <option value="#9b59b6">Amethyst Purple</option>
          <option value="#e91e63">Pink</option>
        </select>
      </div>
    </div>
    <h5>(EXPERIMENTAL STILL, STUFF MAY BE ADDED OR REMOVED.)</h5>
  </div>
  </center>
  </body>
</html>
